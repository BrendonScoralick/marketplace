<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/src/styles/global.css">
</head>

<body>
    <header class="header">
        <!---------------------------------------------------HEADER-------------------------------------------------------------------->

        <div class="header__container">

            <div class="header__logo">
                <a class="header__link-logo" href="/frontend/index.html">
                    <span class="header__logo-nexo">NEXO</span>
                    <span class="header__logo-market">MARKET</span>
                </a>

            </div>

            <div class="header__location">
                <i class="fa-solid fa-location-crosshairs"></i>
                <div class="header__location-text">
                    <span style="font-weight: bold;">Entregar em:</span>
                    <br>
                    <span>Algum lugar</span>
                </div>

            </div>

            <div class="header__search-container">
                <input class="header__search-input" placeholder="Oque você procura?">
                <button class="header__search-button">Buscar</button>
            </div>

            <div class="header__user">
                <i class="fa-regular fa-user"></i>
                <div class="header__user-text">
                    <span>olá,</span>
                    <br>
                    <span>usuário!</span>
                </div>

            </div>

            <div class="header__notification">
                <i class="fa-regular fa-bell"></i>
            </div>

            <div class="header__favorite">
                <i class="fa-regular fa-heart"></i>
            </div>

        </div>

    </header>
    <!---------------------------------------------------CATEGORIAS-------------------------------------------------------------------->

    <div class="categorias">
        <div class="categorias__container">
            <div class="categorias__opcoes">
                <a href="">Eletrônicos</a>
                <a href="">Moda</a>
                <a href="">Casa & Jardim</a>
                <a href="">Esportes</a>
                <a href="">Livros</a>
                <a href="">Brinquedos</a>
                <a href="">Beleza</a>
                <a href="">Automotivo</a>

            </div>
            <div class="categorias__button">
                <i class="fa-solid fa-bolt" style="color: rgb(255, 212, 59);"></i>
                <button>Ofertas do dia</button>
            </div>
        </div>
    </div>
    <!---------------------------------------------------BANNER-------------------------------------------------------------------->
    <section class="hero-banner">
        <div class="hero-banner__content">
            <span class="hero-banner__tag">OFERTA ESPECIAL</span>
            <h1>Moda & Estilo</h1>
            <p>Novidades da temporada com frete grátis</p>
            <button class="hero-banner__btn">Comprar Agora →</button>
        </div>

        <button class="hero-banner__arrow hero-banner__arrow--prev"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="hero-banner__arrow hero-banner__arrow--next"><i class="fa-solid fa-chevron-right"></i></button>

        <div class="hero-banner__dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>
    <!---------------------------------------------------CARD-CATEGORIAS-------------------------------------------------------------------->
    <section class="card-catogorias">
        <div class="card-categorias__container">
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-laptop" style="color: rgb(59, 141, 255);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Eletrônicos</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-shirt" style="color: green;"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Moda</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-house" style="color: rgb(255, 59, 59);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Casa & Jardim</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-futbol" style="color: rgb(255, 212, 59);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Esportes</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-book" style="color: rgb(160, 10, 219);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Livros</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-cubes-stacked" style="color: rgb(0, 255, 234);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Brinquedos</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-spray-can-sparkles" style="color: rgb(255, 212, 59);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Beleza</span>
                    </div>
                </div>
            </div>
            <div class="card-categorias__card">
                <div class="card-categorias__card-container">
                    <div class="card-categorias__card-icon">
                        <div class="card-categorias__card-icon-container">
                            <i class="fa-solid fa-car" style="color: rgb(255, 59, 59);"></i>
                        </div>
                    </div>
                    <div class="card-categorias__descricao-card">
                        <span>Automotivo</span>
                    </div>
                </div>
            </div>
        </div>

    </section>


</body>

</html>
